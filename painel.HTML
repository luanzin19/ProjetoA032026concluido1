<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Paciente</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(135deg, #cfefff, #ffffff);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 30px;
    background: rgba(77,166,255,0.9);
    color:white;
    backdrop-filter: blur(10px);
}

.header .user{
    font-weight:bold;
}

.header button{
    background:white;
    border:none;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    color:#4da6ff;
    font-weight:bold;
    transition:0.3s;
}

.header button:hover{
    transform:scale(1.05);
}

/* CONTAINER */
.container{
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

/* TITLE */
.title{
    text-align:center;
    margin-bottom:30px;
}

.title h1{
    color:#4da6ff;
    font-size:32px;
}

.title p{
    color:#666;
}

/* GRID */
.menu{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:20px;
}

/* CARD */
.card{
    background: rgba(255,255,255,0.9);
    border:1px solid #d9ecff;
    border-radius:18px;
    padding:25px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.card:hover{
    transform:translateY(-8px);
    background:#4da6ff;
    color:white;
}

.icon{
    font-size:45px;
    margin-bottom:10px;
}

.card h3{
    margin-bottom:5px;
}

.card p{
    font-size:13px;
    opacity:0.8;
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:40px;
    font-size:13px;
    color:#777;
}
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
    <div>🏥 Sistema Médico</div>
    <div class="user" id="usuario">Usuário</div>
    <button onclick="sair()">Sair</button>
</div>

<!-- CONTAINER -->
<div class="container">

    <div class="title">
        <h1>Bem-vindo ao Painel</h1>
        <p>Acesse suas funcionalidades abaixo</p>
    </div>

    <div class="menu">

        <div class="card" onclick="ir('exames.html')">
            <div class="icon">📋</div>
            <h3>Exames</h3>
            <p>Cadastro e resultados</p>
        </div>

        <div class="card" onclick="ir('consultas.html')">
            <div class="icon">🩺</div>
            <h3>Consultas</h3>
            <p>Agendar e visualizar</p>
        </div>

        <div class="card" onclick="ir('lembretes.html')">
            <div class="icon">⏰</div>
            <h3>Lembretes</h3>
            <p>Medicamentos e alertas</p>
        </div>

        <div class="card" onclick="ir('historico.html')">
            <div class="icon">📊</div>
            <h3>Histórico</h3>
            <p>Registros médicos</p>
        </div>

        <div class="card" onclick="ir('paciente.html')">
            <div class="icon">👤</div>
            <h3>Paciente</h3>
            <p>Perfil e dados</p>
        </div>

    </div>

    <div class="footer">
        Sistema desenvolvido com Flask + SQLite
    </div>

</div>

<script>
const usuario = localStorage.getItem("usuario");

document.getElementById("usuario").innerText =
 "Bem vindo ";

function ir(pagina){
    window.location.href = pagina;
}

function sair(){
    localStorage.removeItem("usuario");
    window.location.href = "index.html";
}
</script>

</body>
</html>
