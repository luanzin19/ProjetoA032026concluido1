<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="logo">
        <img src="proj.png" alt="Logo" class="logo-img">
    </div>

    <h2 style="text-align:center; margin-bottom:20px;">
        Criar Conta
    </h2>

    <div class="input-group">
        <label>Nome Completo</label>
        <input type="text" placeholder="Digite seu nome">
    </div>

    <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Digite seu email">
    </div>

    <div class="input-group">
        <label>Usuário</label>
        <input type="text" placeholder="Crie um usuário">
    </div>

    <div class="input-group">
        <label>Senha</label>

        <div class="senha-box">
            <input type="password" id="senhaCadastro" placeholder="Crie uma senha">
            <button type="button" onclick="mostrarSenha('senhaCadastro', this)">Ver</button>
        </div>
    </div>

    <div class="input-group">
        <label>Confirmar Senha</label>

        <div class="senha-box">
            <input type="password" id="confirmarSenha" placeholder="Confirme sua senha">
            <button type="button" onclick="mostrarSenha('confirmarSenha', this)">Ver</button>
        </div>
    </div>

    <button class="btn">Cadastrar</button>

    <div class="link">
        <a href="index.html">Voltar para Login</a>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
